<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramienta de busqueda</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MiSitio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center">Hola</h1>
        <p class="text-center">Texto de prueba</p>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Columna 1</h5>
                    <p>Contenido de ejemplo.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Columna 2</h5>
                    <p>Contenido de ejemplo.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Columna 3</h5>
                    <p>Contenido de ejemplo.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="container text-center mt-5">
        <h1>Obtener ubicación</h1>
        <p>Haz clic en el botón para compartir tu ubicación</p>

        <button class="btn btn-primary" onclick="obtenerUbicacion()">
            Obtener ubicación
        </button>

        <div class="mt-4">
            <p id="resultado"></p>
        </div>
    </div>

    <script>
        function obtenerUbicacion() {
            const resultado = document.getElementById("resultado");

            if (navigator.geolocation) {

                resultado.innerHTML = "Solicitando ubicación...";

                navigator.geolocation.getCurrentPosition(
                    function (posicion) {
                        const lat = posicion.coords.latitude;
                        const lon = posicion.coords.longitude;

                        resultado.innerHTML = `
                    <strong>Latitud:</strong> ${lat} <br>
                    <strong>Longitud:</strong> ${lon}
                `;
                    },
                    function (error) {
                        switch (error.code) {
                            case error.PERMISSION_DENIED:
                                resultado.innerHTML = "El usuario rechazó el permiso.";
                                break;
                            case error.POSITION_UNAVAILABLE:
                                resultado.innerHTML = "Ubicación no disponible.";
                                break;
                            case error.TIMEOUT:
                                resultado.innerHTML = "Tiempo de espera agotado.";
                                break;
                            default:
                                resultado.innerHTML = "Error desconocido.";
                        }
                    }
                );

            } else {
                resultado.innerHTML = "Tu navegador no soporta geolocalización.";
            }
        }
    </script>
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p>© 2026 MiSitio</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
