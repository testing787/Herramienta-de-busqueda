<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramienta de busqueda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--Librerías para el efecto flip------------------------------------------------------------>
    <script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
    <script src="https://cdn.rawgit.com/nnattawat/flip/master/dist/jquery.flip.min.js"></script>
    <!------------------------------------------------------------------------------------------->
    <script type="module" src="/sw.js"></script>
    <script type="module" src="/js/consultasFirebase.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MiSitio</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-center mt-5">
        <div style="width: 600px;">
            <div id="miCarrusel" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="2"></button>
                    <button type="button" data-bs-target="#miCarrusel" data-bs-slide-to="3"></button>
                </div>

                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="/IMG/logo-mercadolibre-jfSLD38V.webp" class="d-block w-100"
                            style="height:400px; object-fit:cover;" alt="Imagen 1">
                    </div>
                    <div class="carousel-item">
                        <img src="/IMG/freefire.jpg" class="d-block w-100" style="height:400px; object-fit:cover;"
                            alt="Imagen 2">
                    </div>
                    <div class="carousel-item">
                        <img src="/IMG/playstore.jpg" class="d-block w-100" style="height:400px; object-fit:cover;"
                            alt="Imagen 3">
                    </div>
                    <div class="carousel-item">
                        <img src="/IMG/cinepolis-miguel-mier-articulo.jpg" class="d-block w-100"
                            style="height:400px; object-fit:cover;" alt="Imagen 3">
                    </div>
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#miCarrusel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#miCarrusel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>
    </div>
    <div class="container mt-4">
        <div class="row mt-4">
            <div class="col-md-6">
                <div id="card">
                    <div class="front">
                        <img src="/IMG/cinemex.jpg" class="img-thumbnail" width="170" height="100">
                        <div class="row mt-4 g-1">
                            <div class="col-md-4"></div>
                        </div>
                    </div>
                    <div class="back">
                        <img src="/IMG/roblox.jpg" class="img-thumbnail" width="170" height="100">
                        <div class="row mt-4">
                            <div class="col-md-4">
                                <h4>MUNDIAL26</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div id="carde">
                    <div class="front">
                        <img src="/IMG/uber.svg" class="img-thumbnail" width="170" height="100">
                        <div class="row mt-4">
                            <div class="col-md-4"></div>
                        </div>
                    </div>

                    <div class="back">
                        <img src="/IMG/cinemex.jpg" class="img-thumbnail" width="170" height="100">
                        <div class="row mt-4">
                            <div class="col-md-4">
                                <h4>MUNDIAL26</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2026 MiSitio</p>
</footer>

</html>
